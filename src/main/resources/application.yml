server:
  forward-headers-strategy: native
  port: 8085
  ssl:
    bundle: local-cert
    enabled: true

spring:
  application:
    name: easyplan
  config:
    import:
      - optional:file:.env[.properties]
  thymeleaf:
    cache: false
    prefix: classpath:templates/
    suffix: .html
    mode: HTML
  datasource:
    url: ${JDBC_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${JDBC_USERNAME}
    password: ${JDBC_PASSWORD}
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    
  data: 
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 5000ms
  ssl:
    bundle:
      pem:
        local-cert:
          keystore:
            certificate: ${SSL_CERT}
            private-key: ${SSL_KEY}
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
            port: ${SMTP_PORT}
jwt:
  secret: ${JWT_SECRET}
  times:
    access: 18000000
    refresh: 604800000
  
logging:
  level:
    org:
      springframework:
        security: DEBUG
        cache: trace