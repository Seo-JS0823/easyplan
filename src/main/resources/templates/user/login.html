<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" th:href="@{/css/reset.css}">
	<link rel="stylesheet" th:href="@{/css/nav.css}">
	<link rel="stylesheet" th:href="@{/css/login.css}">
	<script th:src="@{/js/easyplan-util.js}"></script>
	<title>HTML Thymeleaf Template</title>
</head>
<body>
	<div class="nav-bar">
		<script th:src="@{/js/component/user-component.js}"></script>
		<div class="nav-control">
			<a th:href="@{#}">Easy Plan</a>
			<a th:href="@{#}">가계부</a>
			<a th:href="@{#}">게시판</a>
		</div>
		<div class="nav-user-control">
			<button id="login">로그인</button>
			<button id="signup">회원가입</button>
		</div>
		
		<div id="modal-overlay" class="user-modal-overlay close">
			<div class="user-modal">
				<div class="user-modal-header">
					<h1>Easy Plan login</h1>
				</div>
				
				<div class="user-modal-input">
					<div class="in-group">
						<label for=login-email>아이디</label>
						<input type="text" id="login-email" placeholder="사용자 이메일">
					</div>
					
					<div class="in-group">
						<label for="login-password">비밀번호</label>
						<input type="password" id="login-password" placeholder="비밀번호">
					</div>
				</div>
				
				<div class="user-modal-control">
					<button id="login-run">로그인</button>
					<a th:href="@{#}">아이디 및 비밀번호 찾기</a>
				</div>
			</div>
		</div>
	</div>
	<script th:src="@{/js/user/user.js}"></script>
</body>
</html>
