<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
	<header class="topbar" th:fragment="TopBar">
		<div class="topbar-block">
	    <a th:href="@{#}" class="topbar-icon">
	      <img th:src="@{/images/easyplan.jpg}">
	    </a>
	    <a th:href="@{#}" class="topbar-link">가계부</a>
	    <a th:href="@{#}" class="topbar-link">게시판</a>
	  </div>
	  <div class="topbar-block">
	    <button id="theme-toggle" class="topbar-btn" data-mode="light">
	      <svg id="theme-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
	        <path d="M12 18C8.68629 18 6 15.3137 6 12C6 8.68629 8.68629 6 12 6C15.3137 6 18 8.68629 18 12C18 15.3137 15.3137 18 12 18ZM12 16C14.2091 16 16 14.2091 16 12C16 9.79086 14.2091 8 12 8C9.79086 8 8 9.79086 8 12C8 14.2091 9.79086 16 12 16ZM11 1H13V4H11V1ZM11 20H13V23H11V20ZM3.51472 4.92893L4.92893 3.51472L7.05025 5.63604L5.63604 7.05025L3.51472 4.92893ZM16.9497 18.364L18.364 16.9497L20.4853 19.0711L19.0711 20.4853L16.9497 18.364ZM19.0711 3.51472L20.4853 4.92893L18.364 7.05025L16.9497 5.63604L19.0711 3.51472ZM5.63604 16.9497L7.05025 18.364L4.92893 20.4853L3.51472 19.0711L5.63604 16.9497ZM23 11V13H20V11H23ZM4 11V13H1V11H4Z"></path>
	      </svg>
	    </button>
	    <div class="topbar-user">
	      <img class="topbar-user-icon" th:src="@{/images/profile.jpg}" data-topbar="dropdown:profile">
	      <span class="topbar-user-name">게스트</span>
	      <div class="topbar-dropdown" data-topbar="dropdown:profile">
	        <h6 class="topbar-dropdown-header">안녕하세요. 게스트 님!</h6>
	        <a class="topbar-dropdown-item" th:href="@{#}">
	          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
	            <path d="M4 22C4 17.5817 7.58172 14 12 14C16.4183 14 20 17.5817 20 22H18C18 18.6863 15.3137 16 12 16C8.68629 16 6 18.6863 6 22H4ZM12 13C8.685 13 6 10.315 6 7C6 3.685 8.685 1 12 1C15.315 1 18 3.685 18 7C18 10.315 15.315 13 12 13ZM12 11C14.21 11 16 9.21 16 7C16 4.79 14.21 3 12 3C9.79 3 8 4.79 8 7C8 9.21 9.79 11 12 11Z"></path>
	          </svg>
	          <span>프로필</span>
	        </a>
	        <a class="topbar-dropdown-item" tH:href="@{#}">
	          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
	            <path d="M8.68637 4.00008L11.293 1.39348C11.6835 1.00295 12.3167 1.00295 12.7072 1.39348L15.3138 4.00008H19.0001C19.5524 4.00008 20.0001 4.4478 20.0001 5.00008V8.68637L22.6067 11.293C22.9972 11.6835 22.9972 12.3167 22.6067 12.7072L20.0001 15.3138V19.0001C20.0001 19.5524 19.5524 20.0001 19.0001 20.0001H15.3138L12.7072 22.6067C12.3167 22.9972 11.6835 22.9972 11.293 22.6067L8.68637 20.0001H5.00008C4.4478 20.0001 4.00008 19.5524 4.00008 19.0001V15.3138L1.39348 12.7072C1.00295 12.3167 1.00295 11.6835 1.39348 11.293L4.00008 8.68637V5.00008C4.00008 4.4478 4.4478 4.00008 5.00008 4.00008H8.68637ZM6.00008 6.00008V9.5148L3.5148 12.0001L6.00008 14.4854V18.0001H9.5148L12.0001 20.4854L14.4854 18.0001H18.0001V14.4854L20.4854 12.0001L18.0001 9.5148V6.00008H14.4854L12.0001 3.5148L9.5148 6.00008H6.00008ZM12.0001 16.0001C9.79094 16.0001 8.00008 14.2092 8.00008 12.0001C8.00008 9.79094 9.79094 8.00008 12.0001 8.00008C14.2092 8.00008 16.0001 9.79094 16.0001 12.0001C16.0001 14.2092 14.2092 16.0001 12.0001 16.0001ZM12.0001 14.0001C13.1047 14.0001 14.0001 13.1047 14.0001 12.0001C14.0001 10.8955 13.1047 10.0001 12.0001 10.0001C10.8955 10.0001 10.0001 10.8955 10.0001 12.0001C10.0001 13.1047 10.8955 14.0001 12.0001 14.0001Z"></path>
	          </svg>
	          <span>계정 설정</span>
	        </a>
	        <div class="topbar-dropdown-line"></div>
	        <a class="topbar-dropdown-item" th:href="@{#}">
	          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
	            <path d="M12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C15.2713 2 18.1757 3.57078 20.0002 5.99923L17.2909 5.99931C15.8807 4.75499 14.0285 4 12 4C7.58172 4 4 7.58172 4 12C4 16.4183 7.58172 20 12 20C14.029 20 15.8816 19.2446 17.2919 17.9998L20.0009 17.9998C18.1765 20.4288 15.2717 22 12 22ZM19 16V13H11V11H19V8L24 12L19 16Z"></path>
	          </svg>
	          <span>로그아웃</span>
	        </a>
	      </div>
	    </div>
	  </div>
	  <script>
		  const userBtn = document.querySelector('.topbar-user');
			const dropdown = document.querySelector('.topbar-dropdown');
			
			userBtn.addEventListener('click', (e) => {
			  if (e.target.closest('.topbar-dropdown-item')) {
			    e.stopPropagation();
			    return;
			  }
			
			  dropdown.classList.toggle('open');
			  
			  e.stopPropagation();
			});
			
			document.addEventListener('click', () => {
			  if (dropdown.classList.contains('open')) {
			    dropdown.classList.remove('open');
			  }
			});
			
			const themeBtn = document.getElementById('theme-toggle');
			const themeIcon = document.getElementById('theme-icon');
			
			const moonPath = `M10 7C10 10.866 13.134 14 17 14C18.9584 14 20.729 13.1957 21.9995 11.8995C22 11.933 22 11.9665 22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C12.0335 2 12.067 2 12.1005 2.00049C10.8043 3.27098 10 5.04157 10 7ZM4 12C4 16.4183 7.58172 20 12 20C15.0583 20 17.7158 18.2839 19.062 15.7621C18.3945 15.9187 17.7035 16 17 16C12.0294 16 8 11.9706 8 7C8 6.29648 8.08133 5.60547 8.2379 4.938C5.71611 6.28423 4 8.9417 4 12Z`
			const sunPath = 'M12 18C8.68629 18 6 15.3137 6 12C6 8.68629 8.68629 6 12 6C15.3137 6 18 8.68629 18 12C18 15.3137 15.3137 18 12 18ZM12 16C14.2091 16 16 14.2091 16 12C16 9.79086 14.2091 8 12 8C9.79086 8 8 9.79086 8 12C8 14.2091 9.79086 16 12 16ZM11 1H13V4H11V1ZM11 20H13V23H11V20ZM3.51472 4.92893L4.92893 3.51472L7.05025 5.63604L5.63604 7.05025L3.51472 4.92893ZM16.9497 18.364L18.364 16.9497L20.4853 19.0711L19.0711 20.4853L16.9497 18.364ZM19.0711 3.51472L20.4853 4.92893L18.364 7.05025L16.9497 5.63604L19.0711 3.51472ZM5.63604 16.9497L7.05025 18.364L4.92893 20.4853L3.51472 19.0711L5.63604 16.9497ZM23 11V13H20V11H23ZM4 11V13H1V11H4Z';
			
			themeBtn.addEventListener('click', () => {
			  const currentTheme = document.documentElement.getAttribute('data-theme');
			  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
			  
			  document.documentElement.setAttribute('data-theme', newTheme);
			  
			  const iconPath = themeIcon.querySelector('path');
			  if (newTheme === 'dark') {
			    iconPath.setAttribute('d', moonPath);
			  } else {
			    iconPath.setAttribute('d', sunPath);
			  }
			});
	  </script>
	</header>
</body>
</html>
