<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sidebar Control Bar</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1724;
      --sidebar: #121b2c;
      --sidebar-2: #172133;
      --text-dim: #7f8aa3;
      --text: #d9e2f2;
      --hover: #1b2740;
      --active: #2b3346;
      --line: #23304a;
      --accent: #8b93a7;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      --radius: 12px;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(90deg, #8ea1b4 0 36px, transparent 36px),
        var(--bg);
      font-family: Inter, "Noto Sans KR", Arial, sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 24px;
      color: var(--text);
    }

    .sidebar {
      width: 248px;
      min-height: 720px;
      background: linear-gradient(180deg, #111a2b 0%, #0f1727 100%);
      border-radius: 0 18px 18px 0;
      padding: 18px 14px;
      box-shadow: var(--shadow);
      position: relative;
    }

    .section-line {
      height: 1px;
      background: var(--line);
      margin: 8px 6px 18px;
      opacity: 0.8;
    }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.3px;
      color: var(--text-dim);
      margin: 0 10px 12px;
      text-transform: uppercase;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .menu-item {
      width: 100%;
    }

    .menu-button {
      width: 100%;
      height: 44px;
      border: 0;
      background: transparent;
      color: var(--text-dim);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .menu-button:hover {
      background: var(--hover);
      color: var(--text);
    }

    .menu-button.active {
      background: var(--active);
      color: var(--text);
    }

    .menu-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .menu-text {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
    }

    .arrow {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      transition: transform 0.25s ease;
      opacity: 0.9;
    }

    .menu-item.open > .menu-button .arrow {
      transform: rotate(180deg);
    }

    .submenu {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.28s ease;
      margin-left: 18px;
      padding-left: 18px;
      position: relative;
    }

    .submenu::before {
      content: "";
      position: absolute;
      left: 7px;
      top: 0;
      bottom: 10px;
      width: 1px;
      background: #2a3752;
      opacity: 0.9;
    }

    .submenu-inner {
      padding-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .submenu .menu-button {
      height: 38px;
      padding: 0 10px;
      border-radius: 10px;
      font-size: 13px;
    }

    .submenu .menu-text {
      font-size: 13px;
    }

    .submenu .menu-button.active {
      background: #343b4e;
      color: #eef4ff;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
    }

    .icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: 0.95;
    }

    .spacer {
      height: 24px;
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="section-line"></div>

    <div class="section-title">Main</div>

    <nav class="menu">
      <div class="menu-item">
        <button class="menu-button">
          <span class="menu-left">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M3 10.5 12 3l9 7.5"></path>
              <path d="M5 9.5V20h14V9.5"></path>
            </svg>
            <span class="menu-text">Dashboard</span>
          </span>
        </button>
      </div>

      <div class="menu-item">
        <button class="menu-button">
          <span class="menu-left">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="8" r="3.2"></circle>
              <path d="M5 19c1.7-3 4.2-4.5 7-4.5s5.3 1.5 7 4.5"></path>
            </svg>
            <span class="menu-text">Audience</span>
          </span>
          <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="m6 9 6 6 6-6"></path>
          </svg>
        </button>
      </div>

      <div class="menu-item">
        <button class="menu-button">
          <span class="menu-left">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M6 4h9l3 3v13H6z"></path>
              <path d="M15 4v4h4"></path>
              <path d="M9 13h6"></path>
              <path d="M9 17h6"></path>
            </svg>
            <span class="menu-text">Posts</span>
          </span>
        </button>
      </div>

      <div class="menu-item">
        <button class="menu-button">
          <span class="menu-left">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="4" y="5" width="16" height="15" rx="2"></rect>
              <path d="M8 3v4"></path>
              <path d="M16 3v4"></path>
              <path d="M4 10h16"></path>
            </svg>
            <span class="menu-text">Schedules</span>
          </span>
        </button>
      </div>

      <div class="menu-item open">
        <button class="menu-button active" data-toggle="submenu-income">
          <span class="menu-left">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M4 18h16"></path>
              <path d="M7 18V9"></path>
              <path d="M12 18V5"></path>
              <path d="M17 18v-7"></path>
            </svg>
            <span class="menu-text">Income</span>
          </span>
          <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="m6 9 6 6 6-6"></path>
          </svg>
        </button>

        <div class="submenu" id="submenu-income">
          <div class="submenu-inner">
            <button class="menu-button">
              <span class="menu-left">
                <span class="menu-text">Earnings</span>
              </span>
            </button>

            <button class="menu-button active">
              <span class="menu-left">
                <span class="menu-text">Refunds</span>
              </span>
            </button>

            <button class="menu-button">
              <span class="menu-left">
                <span class="menu-text">Declines</span>
              </span>
            </button>

            <button class="menu-button">
              <span class="menu-left">
                <span class="menu-text">Payouts</span>
              </span>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <div class="spacer"></div>

    <div class="section-line"></div>
    <div class="section-title">Settings</div>

    <nav class="menu">
      <div class="menu-item">
        <button class="menu-button">
          <span class="menu-left">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 1-3 0 1.7 1.7 0 0 0-1-.6 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 1 0-3 1.7 1.7 0 0 0 .6-1 1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 1 3 0 1.7 1.7 0 0 0 1 .6 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c0 .38.22.74.6 1a1.7 1.7 0 0 1 0 3c-.38.26-.6.62-.6 1Z"></path>
            </svg>
            <span class="menu-text">Settings</span>
          </span>
          <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="m6 9 6 6 6-6"></path>
          </svg>
        </button>
      </div>
    </nav>
  </aside>

  <script>
    function setSubmenuHeight(menuItem) {
      const submenu = menuItem.querySelector(".submenu");
      if (!submenu) return;

      if (menuItem.classList.contains("open")) {
        submenu.style.maxHeight = submenu.scrollHeight + "px";
      } else {
        submenu.style.maxHeight = "0px";
      }
    }

    document.querySelectorAll(".menu-item").forEach(setSubmenuHeight);

    document.querySelectorAll("[data-toggle]").forEach(button => {
      button.addEventListener("click", () => {
        const parent = button.closest(".menu-item");
        parent.classList.toggle("open");
        setSubmenuHeight(parent);
      });
    });
  </script>
</body>
</html>
