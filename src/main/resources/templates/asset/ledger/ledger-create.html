<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:replace="~{layout/head-fragment :: headFragment}"></th:block>
	<th:block th:replace="~{layout/main-component-head-fragment :: MainFragment}"></th:block>
	<link rel="stylesheet" th:href="@{/css/asset/asset.css}">
</head>
<body>
	<!-- login Navbar -->
	<div th:replace="~{layout/nav-login :: navLoginFragment}"></div>
	
	<!-- Ledger Sidebar Fragment -->
	<div th:replace="~{asset/ledger-fragment :: LedgerSidebarFragment}"></div>
	
	<div class="section-content">
		<div class="section-group">
			<div class="section-content-link">
				<a th:href="@{/index}">Home</a> > <a th:href="@{/asset}">가계부</a>
			</div>
			<div class="section-content-title">
				<svg th:replace="~{svg/svg-icon :: Plus-icon}"></svg>
				<h1>가계부</h1>
			</div>
		</div>
		<div class="section-group">
			<button class="create">가계부 생성</button>
		</div>
	</div>
	
	<div class="main-content col">
		<div class="card">
			<div class="card-title">
				<div class="card-title-group">
					<button class="ledger-group">공용</button>
					<p class="card-title-text">우리 가족 가계부</p>					
				</div>
				<div class="card-title-group">
					<button class="update">수정하기</button>
				</div>
			</div>
			<div class="card-content col">
				<!-- 전월 간소화 통계 -->
				<div class="card-last-month">
					<a class="last-month-income" th:href="@{#}">
						<span>전월 총 수입</span>
						<span class="value">

							</svg>
							<span>3,120,000</span>
						</span>
					</a>
					<a class="last-month-expenses" th:href="@{#}">
						<span>전월 총 지출</span>
						<span class="value">
							<svg xmlns:th="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
							  <path d="m23.4,19.429l-3.993,3.993c-.386.385-.895.579-1.404.579-.513,0-1.026-.195-1.417-.586l-4-4,1.414-1.414,3.002,3.002L17.025,0l2,.002-.023,21.017,2.998-3.018,1.4,1.429Zm-13.643-.015l.564.564c-.108.004-.212.022-.321.022C4.486,20,0,15.514,0,10S4.486,0,10,0c1.822,0,3.527.498,5,1.353v14.818l-1-1-4.243,4.243Zm-.757-4.414v1h2v-1c1.654,0,3-1.346,3-3,0-1.36-.974-2.51-2.315-2.733l-3.042-.507c-.373-.062-.644-.382-.644-.76,0-.551.449-1,1-1h2c.551,0,1,.449,1,1h2c0-1.654-1.346-3-3-3v-1h-2v1c-1.654,0-3,1.346-3,3,0,1.36.974,2.51,2.315,2.733l3.042.507c.373.062.644.382.644.76,0,.551-.449,1-1,1h-2c-.551,0-1-.449-1-1h-2c0,1.654,1.346,3,3,3Z"/>
							</svg>
							<span>1,132,000</span>
						</span>
					</a>					
				</div>
				
				<!-- 소비 지출 그래프 -->
				<div class="card-spending">
					<div class="card-spending-header">
						<span>이번달 통계</span>
					</div>
					<div class="spending-graph">
						<div class="graph-group">
							<span>소비</span>
							<span class="stick" data-value="64"></span>
						</div>
						<div class="graph-group">
							
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
