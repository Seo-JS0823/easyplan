      			<a class="menu-button">

      				</span>
      			</a>
      			
      			<a class="menu-button">

		</nav>
		
		<script>
			function setSubmenuHeight(menuItem) {
				const submenu = menuItem.querySelector(".submenu");
				if(!submenu) return;
				
				if(menuItem.classList.contains('open')) {
					submenu.style.maxHeight = submenu.scrollHeight + 'px';
				} else {
					submenu.style.maxHeight = '0px';
				}
			}
			
			document.querySelectorAll('.menu-item').forEach(setSubmenuHeight);
			
			document.querySelectorAll('[data-toggle]').forEach(btn => {
				btn.addEventListener('click', () => {
					const parent = btn.closest('.menu-item');
					parent.classList.toggle('open');
					setSubmenuHeight(parent);
				})
			})
			
			document.addEventListener("DOMContentLoaded", () => {
			    const currentPath = window.location.pathname;
			
			    // 1. 모든 메뉴 링크 중에서 현재 경로와 일치하는 항목 찾기
			    const menuLinks = document.querySelectorAll('.menu-button[href]');
			    
			    menuLinks.forEach(link => {
			        const href = link.getAttribute('href');
			        
			        // 현재 경로가 해당 링크의 href로 시작하거나 일치하는지 확인
			        if (currentPath === href || (href !== '/' && currentPath.startsWith(href))) {
			            // 해당 버튼에 active 클래스 추가
			            link.classList.add('active');
			
			            // 2. 부모 서브메뉴(submenu)가 있다면 열어주기
			            const parentMenuItem = link.closest('.menu-item');
			            if (parentMenuItem) {
			                parentMenuItem.classList.add('open');
			                // 기존에 정의하신 높이 계산 함수 호출
			                if (typeof setSubmenuHeight === 'function') {
			                    setSubmenuHeight(parentMenuItem);
			                }
			            }
			        }
			    });
			});
		</script>
	</aside>
</body>
</html>
